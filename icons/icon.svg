<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2434" />
      <stop offset="100%" stop-color="#0a0d14" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" />
  
  <!-- Factory Icon -->
  <g transform="translate(156, 120)" fill="none" stroke="url(#text-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 220 L4 80 L80 120 L80 60 L140 100 L140 40 L200 80 L200 220 Z" />
    <path d="M140 220 L140 160 L180 160 L180 220" />
    <circle cx="50" cy="180" r="12" fill="url(#text-grad)" />
    <circle cx="100" cy="180" r="12" fill="url(#text-grad)" />
  </g>
  
  <!-- Zohir Text -->
  <text x="50%" y="82%" font-family="sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="4">ZOHIR</text>
  <text x="50%" y="92%" font-family="sans-serif" font-weight="400" font-size="30" fill="#9ca3af" text-anchor="middle">نظام المصانع</text>
</svg>
